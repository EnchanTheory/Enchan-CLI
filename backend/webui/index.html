<!doctype html>
<html lang="en" class="wa-dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Enchan</title>
  <script>try{document.documentElement.dataset.theme=localStorage.getItem("enchan.webui.theme")||"enchan-dark"}catch(_){document.documentElement.dataset.theme="enchan-dark"}</script>
  <link rel="stylesheet" href="/vendor/webawesome/select.css">
  <link rel="stylesheet" href="/assets/css/styles.css">
  <link rel="stylesheet" href="/assets/css/themes.css">
  <link rel="stylesheet" href="/assets/css/status.css">
</head>
<body>
  <header>
    <div class="brand"><div><strong>Enchan</strong><small id="runtime">Local</small></div></div>
    <nav>
      <button class="header-command" id="newChat" data-i18n-title="header.newChat"><img src="/assets/icons/edit_square.svg" alt=""><span data-i18n="header.newChat"></span></button>
      <button class="icon-button appearance-trigger" id="appearanceSettings" data-i18n-title="header.appearance"><span aria-hidden="true">Aa</span></button>
      <button class="icon-button" id="settings" data-i18n-title="header.mascotSettings"><img src="/assets/icons/settings.svg" alt=""></button>
      <span class="backend-status is-checking" id="backendStatus" role="status" aria-live="polite"><i aria-hidden="true"></i><span id="backendStatusText"></span></span>
    </nav>
  </header>
  <main>
    <section id="messages" aria-live="polite">
      <div class="welcome" id="welcome"><h1 data-i18n="welcome.title"></h1><p data-i18n="welcome.body"></p></div>
    </section>
  </main>
  <div class="composer-wrap">
    <div class="composer-row">
      <div class="mascot-track" id="mascotStage" hidden>
        <aside class="mascot-stage">
          <canvas id="mascotSprite" class="mascot-sprite" width="192" height="208" role="img" aria-label="TIKTA"></canvas>
        </aside>
      </div>
      <form id="composer" class="composer">
        <textarea id="prompt" rows="1" data-i18n-placeholder="composer.placeholder" data-i18n-aria-label="composer.messageLabel"></textarea>
        <button id="send" class="send" type="submit" data-i18n-title="composer.send"><img src="/assets/icons/arrow_upward.svg" alt=""></button>
      </form>
    </div>
    <small data-i18n="composer.toolNotice"></small>
  </div>
  <dialog id="appearanceDialog" class="appearance-dialog">
    <form method="dialog" class="dialog-head"><div><h2 data-i18n="appearance.title"></h2><p data-i18n="appearance.subtitle"></p></div><button class="icon-button" value="cancel" data-i18n-title="common.close"><img src="/assets/icons/close.svg" alt=""></button></form>
    <div class="appearance-body">
      <section class="appearance-section">
        <h3 data-i18n="appearance.language.title"></h3>
        <p class="appearance-intro" data-i18n="appearance.language.description"></p>
        <wa-select id="languageSelect" class="enchan-select" size="small">
          <span slot="label" data-i18n="appearance.language.label"></span>
        </wa-select>
      </section>
      <section class="appearance-section">
        <h3 data-i18n="appearance.theme.title"></h3>
        <p class="appearance-intro" data-i18n="appearance.theme.description"></p>
        <div id="themeGrid" class="theme-grid" role="group" data-i18n-aria-label="appearance.theme.groupLabel"></div>
      </section>
      <section class="appearance-section background-settings">
        <div class="appearance-section-head"><div><h3 data-i18n="appearance.background.title"></h3><p data-i18n="appearance.background.storage"></p></div><button id="removeBackground" class="secondary compact" type="button" disabled data-i18n="common.remove"></button></div>
        <label class="background-picker"><span data-i18n="appearance.background.choose"></span><input id="backgroundImage" type="file" accept="image/png,image/jpeg,image/webp"></label>
        <div id="backgroundPreview" class="background-preview" aria-live="polite"><span id="backgroundPreviewText" data-i18n="appearance.background.none"></span></div>
        <div class="background-controls">
          <label><span><span data-i18n="appearance.background.darkness"></span> <output id="backgroundDarknessValue">55%</output></span><input id="backgroundDarkness" type="range" min="30" max="85" step="5" value="55" disabled></label>
          <label><span><span data-i18n="appearance.background.blur"></span> <output id="backgroundBlurValue">2px</output></span><input id="backgroundBlur" type="range" min="0" max="12" step="1" value="2" disabled></label>
          <wa-select id="backgroundPosition" class="enchan-select background-position-select" size="small" disabled>
            <span slot="label" data-i18n="appearance.background.position"></span>
            <wa-option value="center" data-i18n="appearance.background.position.center"></wa-option>
            <wa-option value="top" data-i18n="appearance.background.position.top"></wa-option>
            <wa-option value="bottom" data-i18n="appearance.background.position.bottom"></wa-option>
            <wa-option value="left" data-i18n="appearance.background.position.left"></wa-option>
            <wa-option value="right" data-i18n="appearance.background.position.right"></wa-option>
          </wa-select>
        </div>
        <p id="backgroundError" class="background-error" role="alert"></p>
      </section>
      <p class="appearance-note" data-i18n="appearance.note"></p>
    </div>
  </dialog>
  <dialog id="mascotDialog">
    <form method="dialog" class="dialog-head"><div><h2 data-i18n="mascot.title"></h2><p data-i18n="mascot.subtitle"></p></div><button class="icon-button" value="cancel" data-i18n-title="common.close"><img src="/assets/icons/close.svg" alt=""></button></form>
    <div class="settings-grid">
      <section><div id="mascotList" class="mascot-list"></div><button id="addMascot" class="secondary" type="button" data-i18n="mascot.add"></button></section>
      <form id="mascotForm" class="mascot-form">
        <label><span data-i18n="mascot.id"></span><input id="mascotId" required pattern="[a-z0-9][a-z0-9_-]{0,47}"></label>
        <label><span data-i18n="mascot.name"></span><input id="mascotEditName" required maxlength="80"></label>
        <label><span data-i18n="mascot.description"></span><input id="mascotDescription" maxlength="240"></label>
        <label><span data-i18n="mascot.personality"></span><textarea id="mascotPersonality" rows="5" maxlength="12000" data-i18n-placeholder="mascot.personalityPlaceholder"></textarea></label>
        <label><span data-i18n="mascot.contactSheet"></span><input id="mascotImage" type="file" accept="image/png,image/webp"><small data-i18n="mascot.sheetRequirement"></small></label>
        <div id="sheetPreview" class="mascot-preview">
          <div class="mascot-preview-head">
            <span data-i18n="mascot.animationPreview"></span>
            <select id="previewAnimSelect" hidden>
              <option value="idle" data-i18n="mascot.animation.idle"></option>
              <option value="running-right" data-i18n="mascot.animation.runningRight"></option>
              <option value="running-left" data-i18n="mascot.animation.runningLeft"></option>
              <option value="waving" data-i18n="mascot.animation.waving"></option>
              <option value="jumping" data-i18n="mascot.animation.jumping"></option>
              <option value="failed" data-i18n="mascot.animation.failed"></option>
              <option value="waiting" data-i18n="mascot.animation.waiting"></option>
              <option value="running" data-i18n="mascot.animation.running"></option>
              <option value="review" data-i18n="mascot.animation.review"></option>
            </select>
          </div>
          <div class="mascot-preview-viewport">
            <canvas id="livePreviewCanvas" width="192" height="208" hidden></canvas>
            <span id="sheetPreviewText" data-i18n="mascot.previewEmpty"></span>
          </div>
        </div>
        <div id="sheetError" class="sheet-error" role="alert"></div>
        <button class="primary" type="submit" data-i18n="mascot.saveAndSelect"></button>
      </form>
    </div>
  </dialog>
  <dialog id="approvalDialog" class="approval-dialog" aria-labelledby="approvalTitle" aria-describedby="approvalDescription">
    <div class="approval-head">
      <span class="approval-badge" data-i18n="approval.badge"></span>
      <h2 id="approvalTitle" data-i18n="approval.title"></h2>
      <p id="approvalDescription" data-i18n="approval.description"></p>
    </div>
    <div class="approval-body">
      <p id="approvalSummary" class="approval-summary"></p>
      <dl id="approvalDetails" class="approval-details"></dl>
    </div>
    <div class="approval-actions">
      <button id="approvalAllow" class="primary approval-allow" type="button" data-i18n="approval.allow"></button>
      <button id="approvalDeny" class="secondary approval-deny" type="button" data-i18n="approval.deny"></button>
    </div>
  </dialog>
  <script src="/assets/js/initial-scroll.js"></script>
  <script src="/assets/js/i18n.js"></script>
  <script src="/assets/js/app.js"></script>
  <script src="/assets/js/appearance.js"></script>
  <script src="/assets/js/favicon.js"></script>
  <script src="/assets/js/status.js"></script>
</body>
</html>
