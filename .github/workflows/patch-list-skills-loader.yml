name: Patch obsolete list_skills references in skills_loader

on:
  push:
    branches:
      - agent/trim-tool-schema

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/trim-tool-schema
          fetch-depth: 0
      - name: Remove obsolete list_skills path from skills_loader.py
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('backend/skills_loader.py')
          text = path.read_text(encoding='utf-8')

          old_error = "raise SkillManifestError(f\"Skill '{skill_name}' not found. Please run list_skills to verify names.\")"
          new_error = "raise SkillManifestError(f\"Skill '{skill_name}' not found in the auto-loaded skill catalog.\")"
          if text.count(old_error) != 1:
              raise SystemExit('Expected one obsolete skill-not-found message')
          text = text.replace(old_error, new_error, 1)

          start = text.find('\ndef list_registered_skills() -> str:\n')
          end = text.find('\ndef _compact_schema_text(', start)
          if start == -1 or end == -1:
              raise SystemExit('Could not locate list_registered_skills block')
          text = text[:start] + '\n' + text[end:]

          old_header = '''    header = (\n        "Auto-loaded skill capability registry. These skills are installed now from skills/. "\n        "Treat each entry as a named capability available through use_skill; do not call list_skills merely to discover skill names. "\n        "When a user task matches a skill description, call use_skill with that skill name and method before falling back to generic tools. "\n        "Call list_skills only when you need expanded schemas or troubleshooting detail.\\n"\n    )'''
          new_header = '''    header = (\n        "Auto-loaded skill capability registry. These skills are installed now from skills/. "\n        "Treat each entry as a named capability available through use_skill. "\n        "When a user task matches a skill description, call use_skill with that skill name and method before falling back to generic tools.\\n"\n    )'''
          if text.count(old_header) != 1:
              raise SystemExit('Expected one obsolete catalog header')
          text = text.replace(old_header, new_header, 1)

          old_truncation = 'return content[: max_chars - 80].rstrip() + "\\n...\\n[Skill catalog truncated; call list_skills for full details.]"'
          new_truncation = 'return content[: max_chars - 48].rstrip() + "\\n...\\n[Skill catalog truncated.]"'
          if text.count(old_truncation) != 1:
              raise SystemExit('Expected one obsolete truncation message')
          text = text.replace(old_truncation, new_truncation, 1)

          if 'list_skills' in text or 'list_registered_skills' in text:
              raise SystemExit('Obsolete list_skills reference remains in backend/skills_loader.py')

          path.write_text(text, encoding='utf-8')
          PY
      - name: Validate Python syntax
        run: python -m py_compile backend/skills_loader.py
      - name: Commit patched file and remove temporary workflow
        shell: bash
        run: |
          rm .github/workflows/patch-list-skills-loader.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/skills_loader.py .github/workflows/patch-list-skills-loader.yml
          git commit -m "Remove obsolete list_skills loader path"
          git push origin HEAD:agent/trim-tool-schema
